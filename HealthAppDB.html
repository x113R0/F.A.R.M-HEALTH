<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health App DB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="icon" type="image/png" href="img/Logo_mini.png" />
    <script>
      let db;
      const secretKey = "1234567890987654321";
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$-_";

      function generateRandomPassword(length = 10) {
        let password = "";
        for (let i = 0; i < length; i++) {
          password += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return password;
      }

      function fetchAndStore(url, storeName, encryptedData) {
        return fetch(url).then((res) => res.json()).then((items) => { items.forEach((item) => {
              const store = db.transaction([storeName], "readwrite").objectStore(storeName);
              if (encryptedData === true) {
                if (item.password === undefined) {
                  item.password = generateRandomPassword();
                }
                const request = store.add({...item, password: CryptoJS.AES.encrypt(item.password, secretKey).toString()});
              } else {
                const request = store.add(item);
              }
              request.onsuccess = (event) => {};
              request.onerror = (event) => {};
            });
          })
          .catch((error) => {
            console.error(`Error fetching ${storeName} data:`, error);
          });
      }

      const request = indexedDB.open("HealthAppDB", 1);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (
          !db.objectStoreNames.contains("admins") &&
          !db.objectStoreNames.contains("doctors") &&
          !db.objectStoreNames.contains("patients") &&
          !db.objectStoreNames.contains("medicine") &&
          !db.objectStoreNames.contains("notes") &&
          !db.objectStoreNames.contains("prescriptions") &&
          !db.objectStoreNames.contains("appointments")
        ) {
          const adminStore = db.createObjectStore("admins", { keyPath: "id", autoIncrement: true });
          adminStore.createIndex("username", "username", { unique: true });
          adminStore.createIndex("password", "password", { unique: true });

          const doctorStore = db.createObjectStore("doctors", { keyPath: "id", autoIncrement: true });
          doctorStore.createIndex("id", "id", { unique: true });
          doctorStore.createIndex("first_name", "first_name", { unique: false });
          doctorStore.createIndex("last_name", "last_name", { unique: false });
          doctorStore.createIndex("gender", "gender", { unique: false });
          doctorStore.createIndex("Address", "Address", { unique: false });
          doctorStore.createIndex("email", "email", { unique: true });
          doctorStore.createIndex("Telephone", "Telephone", { unique: true });
          doctorStore.createIndex("password", "password", { unique: true });
          doctorStore.createIndex("specialization", "specialization", { unique: false });

          const patientStore = db.createObjectStore("patients", { keyPath: "id", autoIncrement: true });
          patientStore.createIndex("id", "id", { unique: true });
          patientStore.createIndex("NHS", "NHS", { unique: true });
          patientStore.createIndex("Title", "Title", { unique: false });
          patientStore.createIndex("First", "First", { unique: false });
          patientStore.createIndex("Last", "Last", { unique: false });
          patientStore.createIndex("DOB", "DOB", { unique: false });
          patientStore.createIndex("Gender", "Gender", { unique: false });
          patientStore.createIndex("Address", "Address", { unique: false });
          patientStore.createIndex("email", "email", { unique: true });
          patientStore.createIndex("Telephone", "Telephone", { unique: true });
          patientStore.createIndex("password", "password", { unique: true });
          patientStore.createIndex("age", "age", { unique: false });
          patientStore.createIndex("lastVisit", "lastVisit", { unique: false });
          patientStore.createIndex("condition", "condition", { unique: false });
          patientStore.createIndex("status", "status", { unique: false });
          patientStore.createIndex("nextAppointment", "nextAppointment", { unique: false });
          patientStore.createIndex("height", "height", { unique: false });
          patientStore.createIndex("weight", "weight", { unique: false });

          const medicineStore = db.createObjectStore("medicine", { keyPath: "id", autoIncrement: true });
          medicineStore.createIndex("id", "id", { unique: true });
          medicineStore.createIndex("drug", "drug", { unique: false });

          const notesStore = db.createObjectStore("notes", { keyPath: "id", autoIncrement: true });
          notesStore.createIndex("id", "id", { unique: true });
          notesStore.createIndex("patientId", "patientId", { unique: false });
          notesStore.createIndex("date", "date", { unique: false });
          notesStore.createIndex("content", "content", { unique: false });

          const prescriptionsStore = db.createObjectStore("prescriptions", { keyPath: "id", autoIncrement: true });
          prescriptionsStore.createIndex("id", "id", { unique: true });
          prescriptionsStore.createIndex("patientId", "patientId", { unique: false });
          prescriptionsStore.createIndex("medicineId", "medicineId", { unique: false });
          prescriptionsStore.createIndex("prescribedDate", "prescribedDate", { unique: false });
          prescriptionsStore.createIndex("dosage", "dosage", { unique: false });
          prescriptionsStore.createIndex("frequency", "frequency", { unique: false });
          prescriptionsStore.createIndex("duration", "duration", { unique: false });
          prescriptionsStore.createIndex("status", "status", { unique: false });
          prescriptionsStore.createIndex("reason", "reason", { unique: false });
          prescriptionsStore.createIndex("requestDate", "requestDate", { unique: false });
          prescriptionsStore.createIndex("medicineName", "medicineName", { unique: false });

          const appointmentsStore = db.createObjectStore("appointments", { keyPath: "id", autoIncrement: true });
          appointmentsStore.createIndex("id", "id", { unique: true });
          appointmentsStore.createIndex("patientId", "patientId", { unique: false });
          appointmentsStore.createIndex("doctorId", "doctorId", { unique: false });
          appointmentsStore.createIndex("doctorName", "doctorName", { unique: false });
          appointmentsStore.createIndex("preferredDate", "preferredDate", { unique: false });
          appointmentsStore.createIndex("requestDate", "requestDate", { unique: false });
          appointmentsStore.createIndex("preferredTime", "preferredTime", { unique: false });
          appointmentsStore.createIndex("status", "status", { unique: false });
          appointmentsStore.createIndex("reason", "reason", { unique: false });
        }
      };

      request.onsuccess = (event) => {
        db = event.target.result;
        console.log("Database initialized successfully.");
      };
      
      request.onerror = (event) => {
        console.error("Database error:", event.target.error);
      };

      function fetchDummyData() {
        if (!db) return alert("Database not initialized yet.");
        var baseUrl = "https://raw.githubusercontent.com/x113R0/F.A.R.M-HEALTH/main/";
        
        Promise.all([
          fetchAndStore(baseUrl + "json/Admin.json", "admins", true),
          fetchAndStore(baseUrl + "json/Patients.json", "patients", true),
          fetchAndStore(baseUrl + "json/Medicine.json", "medicine", false),
          fetchAndStore(baseUrl + "json/Doctors.json", "doctors", true)
        ]).then(() => alert("Dummy data fetched and added."));
      }

      function clearDatabase() {
        if (!db) return;
        if (!confirm("Are you sure you want to clear all data? This cannot be undone.")) return;
        
        const stores = ["admins", "doctors", "patients", "medicine", "notes", "prescriptions", "appointments"];
        stores.forEach(storeName => {
          const transaction = db.transaction([storeName], "readwrite");
          const store = transaction.objectStore(storeName);
          store.clear();
        });
        alert("All tables cleared.");
      }
    </script>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; }
      .actions button { padding: 10px 15px; margin: 10px 5px; cursor: pointer; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; background: #007bff; color: white; }
      .actions button:hover { background: #0056b3; }
      .danger { background: #dc3545 !important; }
      .danger:hover { background: #c82333 !important; }
    </style>
  </head>
  <body>
    <h1>HealthApp Database Dashboard</h1>
    <p>Use the controls below to manage the local IndexedDB instance manually.</p>
    <div class="actions">
      <button onclick="fetchDummyData()">Fetch & Load Dummy Data (JSON)</button>
      <button onclick="clearDatabase()" class="danger">Clear All Database Tables</button>
    </div>
  </body>
</html>
